{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fleet-secrets
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreName }}
    kind: {{ .Values.externalSecret.secretStoreKind }}
  target:
    name: fleet-secrets
  data:
    - secretKey: bearer
      remoteRef:
        key: {{ .Values.secrets.bearerVaultPath }}
        property: token
    - secretKey: graphiti_bearer
      remoteRef:
        key: {{ .Values.secrets.graphitiBearerVaultPath }}
        property: token
    - secretKey: anthropic_api_key
      remoteRef:
        key: {{ .Values.secrets.anthropicApiKeyVaultPath }}
        property: key
{{- end }}
