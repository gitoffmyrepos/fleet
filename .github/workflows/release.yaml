name: release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: harbor.strategybase.local
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASS }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            harbor.strategybase.local/fleet/fleet:${{ github.ref_name }}
            harbor.strategybase.local/fleet/fleet:latest
      - uses: azure/setup-helm@v4
      - run: |
          helm package deploy/helm --version "${GITHUB_REF_NAME#v}" --app-version "${GITHUB_REF_NAME#v}"
          ls *.tgz
