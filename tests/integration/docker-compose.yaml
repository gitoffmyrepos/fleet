services:
  graphiti-stub:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.12-slim
        RUN pip install fastapi uvicorn
        COPY graphiti_stub.py /graphiti_stub.py
        CMD ["uvicorn", "graphiti_stub:app", "--host", "0.0.0.0", "--port", "8000"]
    ports: ["18800:8000"]
  fleet-mcp:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      FLEET_BEARER_TOKEN: "test"
      FLEET_GRAPHITI_URL: "http://graphiti-stub:8000/mcp"
      FLEET_RUFLO_CLI_PATH: "/fake-bin/claude-flow"
      FLEET_CLAUDE_CLI_PATH: "/fake-bin/claude"
      FLEET_LISTEN_PORT: "8000"
      FLEET_LOG_LEVEL: "DEBUG"
    volumes:
      - ./fake-bin:/fake-bin:ro
    ports: ["18000:8000"]
    depends_on: [graphiti-stub]
